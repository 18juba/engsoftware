services:
  postgres:
    image: postgres:17-alpine
    container_name: engsoftware-postgres-1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pg_network
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-60}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${AUTH_SERVICE_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pg_network
      - app_network
    restart: unless-stopped

  backend-aspnet:
    build:
      context: ./Backend/Backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - CONNECTION_STRING=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - Jwt__Key=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-EscolaApi}
      - Jwt__Audience=${JWT_AUDIENCE:-EscolaClientes}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pg_network
      - app_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - auth-service
      - backend-aspnet
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app_network
    restart: unless-stopped

networks:
  pg_network:
    driver: bridge
  app_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local