version: '3.8'

services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    environment:
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DATABASE_URL=${AUTH_DB_URL}
      - DATABASE_TOKEN=${AUTH_DB_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_TTL_MINUTES=${JWT_TTL_MINUTES}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - CORS_ORIGINS=${CORS_ORIGINS}
    ports:
      - "${AUTH_SERVICE_PORT:-8000}:8000"
    restart: unless-stopped

  backend-aspnet:
    build:
      context: ./Backend/Backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - TURSO_DATABASE_URL=${ESCOLA_DB_URL}
      - TURSO_AUTH_TOKEN=${ESCOLA_DB_TOKEN}
      - Jwt__Key=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - AUTH_SERVICE_URL=http://auth-service:8000
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8080}
      - PUBLIC_AUTHAPI_URL=${PUBLIC_AUTHAPI_URL:-http://localhost:8000}
      - HOST=0.0.0.0
      - PORT=3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped