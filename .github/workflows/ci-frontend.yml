name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

defaults:
  run:
    working-directory: frontend

jobs:
  lint-check-build:
    name: Lint, check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (prettier + eslint)
        run: bun run lint

      - name: Type check (svelte-check)
        run: bun run check

      - name: Build
        run: bun run build
        env:
          # Valores vazios são suficientes para o build estático não falhar
          PUBLIC_API_URL: http://localhost:8080
          PUBLIC_AUTHAPI_URL: http://localhost:8000
