name: CI — Auth Service

on:
  push:
    branches: [main]
    paths:
      - "auth-service/**"
  pull_request:
    branches: [main]
    paths:
      - "auth-service/**"

defaults:
  run:
    working-directory: auth-service

jobs:
  lint-and-test:
    name: Lint, vet & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth-service/go.mod
          cache-dependency-path: auth-service/go.sum

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Os seguintes arquivos não estão formatados:"
            echo "$unformatted"
            echo "Rode 'gofmt -w .' localmente e faça commit."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: auth-coverage
          path: auth-service/coverage.out
          retention-days: 7

  publish:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: auth-service
          file: auth-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/auth-service:latest
            ghcr.io/${{ github.repository_owner }}/auth-service:${{ github.sha }}

      - name: Redeploy on Railway
        run: curl -X POST "${{ secrets.RAILWAY_WEBHOOK_URL_AUTH }}"