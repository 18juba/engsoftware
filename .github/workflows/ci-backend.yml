name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - "Backend/**"
  pull_request:
    branches: [main]
    paths:
      - "Backend/**"

defaults:
  run:
    working-directory: Backend/Backend

jobs:
  build:
    name: Restore & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test EscolaApi.Tests/EscolaApi.Tests.csproj